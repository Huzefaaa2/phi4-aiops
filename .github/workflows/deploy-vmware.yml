name: Deploy VMware Windows AIOps

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      TF_VAR_vsphere_server: ${{ secrets.VSPHERE_SERVER }}
      TF_VAR_vsphere_user: ${{ secrets.VSPHERE_USER }}
      TF_VAR_vsphere_password: ${{ secrets.VSPHERE_PASSWORD }}
      TF_VAR_datacenter: ${{ secrets.VSPHERE_DATACENTER }}
      TF_VAR_cluster: ${{ secrets.VSPHERE_CLUSTER }}
      TF_VAR_datastore: ${{ secrets.VSPHERE_DATASTORE }}
      TF_VAR_network: ${{ secrets.VSPHERE_NETWORK }}
      TF_VAR_template_name: ${{ secrets.VSPHERE_TEMPLATE }}
      TF_VAR_admin_password: ${{ secrets.WINDOWS_ADMIN_PASSWORD }}
      TF_VAR_ipv4_address: ${{ secrets.VM_IPV4_ADDRESS }}
      TF_VAR_ipv4_gateway: ${{ secrets.VM_IPV4_GATEWAY }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - run: terraform -chdir=terraform/vmware init
      - run: terraform -chdir=terraform/vmware apply -auto-approve
